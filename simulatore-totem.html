<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulatore Totem CUP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="totem-mode">

<main class="container">

  <section class="box evidenza-top">
  
    <div style="margin-bottom: 15px;">
      <a href="index.html" class="btn">⬅ Torna alla guida</a>
    </div>  

    <div class="choice-container simulatore">

      <div class="choice-buttons">

        <button class="totem-btn totem-main cartelle" data-result="cartelle">
          <span class="totem-title">Cartelle cliniche</span>
        </button>

        <button class="totem-btn totem-main pagamento" data-result="pagamenti">
          <span class="totem-title">Pagamenti</span>
        </button>

        <button class="totem-btn totem-main laboratorio" data-result="laboratorio">
          <span class="totem-title">Laboratorio analisi</span>
        </button>

        <button class="totem-btn totem-main prenotazioni" data-result="prenotazioni">
          <span class="totem-title">Prenotazioni e Accettazioni</span>
        </button>

        <button class="totem-btn totem-main cortesia" data-result="cortesia">
          <span class="totem-title">Sportello cortesia</span>
        </button>

        <button class="totem-btn totem-main libera" data-result="libera">
          <span class="totem-title">Libera professione</span>
        </button>

      </div>

      <div id="displayNumero" style="
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
        text-align: center;">
      </div>
<!--
      <div id="listaNumeri" style="
        margin-top: 20px;
        font-size: 16px;
        text-align: center;">
      </div>
    -->
    </div>

  </section>

</main>

  
<script src="simulatore-totem.js"></script>

</body>
</html>
