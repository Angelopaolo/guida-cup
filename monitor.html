<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Monitor CUP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="monitor-mode">

  <main class="monitor-container monitor-totem-style">

    <h1>Monitor CUP</h1>

    <div class="monitor-grid">

      <div class="monitor-card totem-main cartelle" id="card-cartelle">
        <span class="monitor-title">Cartelle cliniche</span>
        <div class="monitor-number" id="num-cartelle">---</div>
        <div class="monitor-time" id="ora-cartelle">---</div>
      </div>

      <div class="monitor-card totem-main pagamento" id="card-pagamenti">
        <span class="monitor-title">Pagamenti</span>
        <div class="monitor-number" id="num-pagamenti">---</div>
        <div class="monitor-time" id="ora-pagamenti">---</div>
      </div>

      <div class="monitor-card totem-main laboratorio" id="card-laboratorio">
        <span class="monitor-title">Laboratorio analisi</span>
        <div class="monitor-number" id="num-laboratorio">---</div>
        <div class="monitor-time" id="ora-laboratorio">---</div>
      </div>

      <div class="monitor-card totem-main prenotazioni" id="card-prenotazioni">
        <span class="monitor-title">Prenotazioni e Accettazioni</span>
        <div class="monitor-number" id="num-prenotazioni">---</div>
        <div class="monitor-time" id="ora-prenotazioni">---</div>
      </div>

      <div class="monitor-card totem-main cortesia" id="card-cortesia">
        <span class="monitor-title">Sportello cortesia</span>
        <div class="monitor-number" id="num-cortesia">---</div>
        <div class="monitor-time" id="ora-cortesia">---</div>
      </div>

      <div class="monitor-card totem-main libera" id="card-libera">
        <span class="monitor-title">Libera professione</span>
        <div class="monitor-number" id="num-libera">---</div>
        <div class="monitor-time" id="ora-libera">---</div>
      </div>

    </div>

    <button id="btnAvviaChiamate" class="btn">▶ Avvia chiamate</button>

    <button id="btnFermaChiamate" class="btn" style="display:none;">
      ⏸ Ferma chiamate
    </button>

    <a href="index.html" class="btn">⬅ Torna alla guida</a>

  </main>

  <script src="monitor.js"></script>
</body>
</html>
